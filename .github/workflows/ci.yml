name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx tsx --test src/tests/parser.test.ts src/tests/delta.test.ts src/tests/jsonFix.test.ts
        env:
          CI: true

      - name: Integration tests (mocked)
        run: npx tsx --test src/tests/advanced.test.ts src/tests/parallel.test.ts src/tests/concurrency.test.ts src/tests/rotation.test.ts
        env:
          CI: true
          TEST_MOCK_PLAYWRIGHT: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        id: secrets
        run: echo "available=${{ secrets.DOCKERHUB_USERNAME != '' }}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3
        if: steps.secrets.outputs.available == 'true'

      - uses: docker/login-action@v3
        if: steps.secrets.outputs.available == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        if: steps.secrets.outputs.available == 'true'
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            pedrofariasx/qwenproxy:latest
            pedrofariasx/qwenproxy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - run: echo "Docker skipped (no secrets)"
        if: steps.secrets.outputs.available != 'true'
